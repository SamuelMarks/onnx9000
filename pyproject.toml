[project]
name = "onnx9000-workspace"
version = "1.0.0"
description = "Polyglot ONNX Ecosystem"
requires-python = ">=3.9"
dependencies = []

[tool.uv.workspace]
members = ["packages/python/*"]

[tool.ruff]
line-length = 100
target-version = "py39"
exclude = [".git", ".mypy_cache", ".ruff_cache", ".venv", "node_modules", "dist", "pycdc"]

[tool.ruff.lint]
select = ["E", "F", "B", "I", "N", "UP", "ANN", "C4", "SIM"]
ignore = ["ANN101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"