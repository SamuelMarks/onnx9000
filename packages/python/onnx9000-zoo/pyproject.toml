[project]
name = "onnx9000-zoo"
version = "1.0.0"
description = "Zoo synchronization and model catalog"
requires-python = ">=3.10"
dependencies = [
    "onnx9000-core",
    "huggingface-hub",
    "requests",
    "numpy",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
onnx9000-zoo = { workspace = true }
