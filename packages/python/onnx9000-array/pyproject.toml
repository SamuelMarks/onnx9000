[project]
name = "onnx9000-array"
version = "1.0.0"
description = "Web-Native NumPy/Eager API for ONNX"
requires-python = ">=3.10"
dependencies = [
    "onnx9000-core",
    "numpy"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000_array"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
