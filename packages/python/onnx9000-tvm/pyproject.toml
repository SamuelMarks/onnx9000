[project]
name = "onnx9000-tvm"
version = "1.0.0"
description = "Apache TVM (Ahead-of-Time Web Compiler) implementation"
requires-python = ">=3.9"
dependencies = [
    "onnx9000-core"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
