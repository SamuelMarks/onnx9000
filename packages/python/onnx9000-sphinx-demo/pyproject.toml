[project]
name = "onnx9000-sphinx-demo"
version = "1.0.0"
description = "ONNX9000 Interactive WASM Demo UI Sphinx Extension"
requires-python = ">=3.10"
dependencies = [
    "sphinx>=7.0.0",
    "docutils>=0.19"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]
