[project]
name = "onnx9000-onnx2gguf"
version = "1.0.0"
description = "Zero-dependency GGUF Exporter for ONNX9000"
requires-python = ">=3.9"
dependencies = [
    "onnx9000-core",
    "onnx9000-toolkit"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
onnx9000-toolkit = { workspace = true }
