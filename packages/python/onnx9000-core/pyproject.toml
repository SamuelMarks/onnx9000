[project]
name = "onnx9000-core"
version = "1.0.0"
description = "Core ONNX Intermediate Representation"
requires-python = ">=3.9"
dependencies = ["protobuf", "numpy"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
