[project]
name = "onnx9000-c-compiler"
version = "1.0.0"
description = "Zero-dependency Strict C89/C99 Exporter for ONNX9000"
requires-python = ">=3.10"
dependencies = [
    "onnx9000-core"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
