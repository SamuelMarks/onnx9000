[project]
name = "onnx9000-json-extract"
version = "1.0.0"
description = "ONNX AST to JSON extractor"
requires-python = ">=3.10"
dependencies = [
    "onnx9000-core"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000/json_extract"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
