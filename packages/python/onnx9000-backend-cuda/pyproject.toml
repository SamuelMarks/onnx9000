[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "onnx9000-backend-cuda"
version = "1.0.0"
description = "CUDA Execution Provider for ONNX9000"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "onnx9000-backend-native",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv.sources]
onnx9000-backend-native = { workspace = true }
