[project]
name = "onnx9000-toolkit"
version = "1.0.0"
description = "Eager Execution, Autograd, Scripting, and Utility APIs"
requires-python = ">=3.9"
dependencies = [
    "onnx9000-core",
    "onnx9000-optimizer"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
onnx9000-toolkit = { workspace = true }
onnx9000-optimizer = { workspace = true }
