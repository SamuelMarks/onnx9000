[project]
name = "onnx9000-tensorrt"
version = "1.0.0"
description = "Zero-Build TRT FFI Parser"
requires-python = ">=3.9"
dependencies = ["onnx9000-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
