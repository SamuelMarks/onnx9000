[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "onnx9000-zero-dep-classifier"
version = "1.0.0"
description = "Zero Dep Classifier for ONNX9000"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "onnx>=1.14.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000_zero_dep_classifier"]
