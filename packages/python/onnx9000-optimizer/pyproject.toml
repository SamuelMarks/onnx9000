[project]
name = "onnx9000-optimizer"
version = "1.0.0"
description = "GraphSurgeon, Simplifier, Olive, and ONNX-Tool for ONNX9000"
requires-python = ">=3.9"
dependencies = [
    "onnx9000-core"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onnx9000"]

[tool.uv.sources]
onnx9000-core = { workspace = true }
onnx9000-optimizer = { workspace = true }
