name: Release
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🛠 Breaking Changes
      labels:
        - breaking-change
    - title: 📝 Documentation
      labels:
        - documentation
    - title: ⚙️ CI/CD & Internal
      labels:
        - internal
        - chore
        - ci
