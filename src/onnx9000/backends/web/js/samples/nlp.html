<!DOCTYPE html>
<html>
<head>
    <title>NLP (Step 359)</title>
    <script src="../dist/onnx9000-web.min.js"></script>
</head>
<body>
    <h2>NLP Example</h2>
    <script>
        async function run() {
            const session = await onnx9000.InferenceSession.create("bert.onnx");
            const tensor = new onnx9000.Tensor("int64", [1n, 2n, 3n, 4n], [1, 4]);
            const output = await session.run({ input_ids: tensor });
            console.log(output);
        }
        run();
    </script>
</body>
</html>
