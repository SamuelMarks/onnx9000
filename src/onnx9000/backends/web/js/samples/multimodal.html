<!DOCTYPE html>
<html>
<head>
    <title>Multimodal (Step 361)</title>
    <script src="../dist/onnx9000-web.min.js"></script>
</head>
<body>
    <h2>Multimodal Inference</h2>
    <script>
        async function run() {
            const session = await onnx9000.InferenceSession.create("clip.onnx");
            const img = new onnx9000.Tensor("float32", new Float32Array(224*224*3), [1, 3, 224, 224]);
            const txt = new onnx9000.Tensor("int64", [101n, 102n], [1, 2]);
            const output = await session.run({ image: img, text: txt });
            console.log(output);
        }
        run();
    </script>
</body>
</html>
