<!DOCTYPE html>
<html>
<head>
    <title>Pure In-Browser Training (Step 360)</title>
    <script src="../dist/onnx9000-web.min.js"></script>
</head>
<body>
    <h2>Training Example</h2>
    <script>
        async function train() {
            const session = await onnx9000.InferenceSession.create("model_train.onnx", { graphOptimizationLevel: "ORT_DISABLE_ALL" });
            const input = new onnx9000.Tensor("float32", new Float32Array(10), [1, 10]);
            const labels = new onnx9000.Tensor("float32", new Float32Array(10), [1, 10]);
            // Pseudo training loop
            for(let i=0; i<10; i++) {
                const grads = await session.run({ x: input, y: labels });
                console.log(`Epoch ${i} done`);
            }
        }
        train();
    </script>
</body>
</html>
