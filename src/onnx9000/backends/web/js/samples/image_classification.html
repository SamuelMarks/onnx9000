<!DOCTYPE html>
<html>
<head>
    <title>Image Classification (Step 359)</title>
    <script src="../dist/onnx9000-web.min.js"></script>
</head>
<body>
    <h2>Image Classification Example</h2>
    <script>
        async function run() {
            const session = await onnx9000.InferenceSession.create("resnet50.onnx");
            const tensor = new onnx9000.Tensor("float32", new Float32Array(1 * 3 * 224 * 224), [1, 3, 224, 224]);
            const output = await session.run({ input: tensor });
            console.log(output);
        }
        run();
    </script>
</body>
</html>
