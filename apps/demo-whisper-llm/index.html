<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Whisper to LLM Demo</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; padding: 2rem; }
    #chat-container { width: 100%; max-width: 600px; background: #1e1e1e; border-radius: 8px; padding: 1rem; display: flex; flex-direction: column; height: 80vh; }
    #log { flex-grow: 1; overflow-y: auto; background: #2d2d2d; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; font-family: monospace; white-space: pre-wrap; }
    .controls { display: flex; gap: 1rem; justify-content: center; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; background: #007acc; color: white; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #555; cursor: not-allowed; }
    button.recording { background: #cc3333; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <h1>Local WebGPU Whisper + LLM</h1>
  <div id="chat-container">
    <div id="log">System initialized. Waiting for interaction...</div>
    <div class="controls">
      <button id="record-btn">Start Recording</button>
      <button id="clear-btn">Clear Log</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
