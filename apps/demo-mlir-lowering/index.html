<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLIR Lowering Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 800px;
        margin: 0 auto;
        color: #333;
      }
      h1 {
        color: #0056b3;
      }
      .panel {
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 1rem;
        margin-bottom: 1rem;
        background-color: #f9f9f9;
      }
      button {
        background-color: #0056b3;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        cursor: pointer;
        border-radius: 4px;
        font-size: 1rem;
        margin-right: 0.5rem;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      button:hover:not(:disabled) {
        background-color: #004494;
      }
      #output {
        white-space: pre-wrap;
        background-color: #eee;
        padding: 1rem;
        border-radius: 4px;
        font-family: monospace;
        min-height: 250px;
        overflow-y: auto;
      }
      .step {
        margin-bottom: 1rem;
        border-left: 3px solid #0056b3;
        padding-left: 10px;
      }
      .step-title {
        font-weight: bold;
        color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>MLIR Lowering Pipeline Demo</h1>
    <p>This demo visualizes the multi-stage lowering process from high-level ONNX operations down to WGSL and WASM representations.</p>
    
    <div class="panel">
      <h3>Compiler Controls</h3>
      <button id="lowerBtn">Run MLIR Lowering Pass</button>
      <button id="resetBtn" disabled>Reset Pipeline</button>
    </div>

    <div class="panel">
      <h3>Compilation Output (IR)</h3>
      <div id="output">Ready to compile. Click "Run MLIR Lowering Pass" to begin.</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
