<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ONNX9000 TensorRT Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 20px;
      }
      .panel {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        white-space: pre-wrap;
        font-family: monospace;
        min-height: 200px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 15px;
        cursor: pointer;
        background: #20344b;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 10px;
      }
    </style>
  </head>
  <body>
    <h1>ONNX9000: TensorRT Exporter</h1>
    <p>This demo transpiles an ONNX Graph AST into a TensorRT Builder script.</p>
    <button id="convert-btn" class="btn">Convert to TensorRT API</button>
    <h3>Generated TensorRT Python Code:</h3>
    <div id="output" class="panel">Waiting to convert...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
