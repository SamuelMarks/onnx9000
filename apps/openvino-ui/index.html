<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONNX to OpenVINO Converter</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
        background: #f5f5f5;
      }
      .container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .dropzone {
        border: 2px dashed #ccc;
        border-radius: 8px;
        padding: 4rem 2rem;
        text-align: center;
        margin: 2rem 0;
        cursor: pointer;
        transition: all 0.3s;
      }
      .dropzone:hover, .dropzone.active {
        border-color: #0056b3;
        background: #f0f8ff;
      }
      .settings {
        margin: 1rem 0;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
      }
      select, input {
        margin-right: 1rem;
      }
      #status {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 4px;
        display: none;
      }
      .success { background: #d4edda; color: #155724; }
      .error { background: #f8d7da; color: #721c24; }
      .info { background: #e2e3e5; color: #383d41; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Web-Native OpenVINO Compiler</h1>
      <p>Convert ONNX models to Intel OpenVINO format strictly inside your browser (zero dependencies, zero server uploads).</p>
      
      <div class="settings">
        <label>
          <input type="checkbox" id="compressFp16" checked>
          Compress Weights to FP16
        </label>
      </div>

      <div class="dropzone" id="dropzone">
        <div id="drop-text">Drag & Drop an .onnx file here<br>or click to browse</div>
        <input type="file" id="file-input" accept=".onnx" style="display: none;">
      </div>

      <div id="status"></div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
