<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ONNX9000 JAX & Flax Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 20px;
      }
      .panel {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        white-space: pre-wrap;
        font-family: monospace;
        min-height: 100px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 15px;
        cursor: pointer;
        background: #20344b;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 10px;
      }
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>ONNX9000: JAX & Flax Converter Demo</h1>
    <p>
      This demo tests parsing a <code>ClosedJaxpr</code> JSON payload entirely within the browser,
      transpiling it into the ONNX9000 Core IR.
    </p>

    <button id="convert-btn" class="btn">Parse JAX Graph</button>

    <h3>Output Logs:</h3>
    <div id="jax-output" class="panel">Waiting...</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
