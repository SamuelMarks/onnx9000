<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONNX to GGUF Converter</title>
    <style>
      :root {
        --bg: #1e1e1e;
        --fg: #e0e0e0;
        --primary: #4CAF50;
        --border: #444;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: var(--bg);
        color: var(--fg);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        max-width: 800px;
        width: 100%;
        background: #252525;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      h1 { text-align: center; }
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: 8px;
        padding: 40px;
        text-align: center;
        margin-bottom: 20px;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .dropzone.dragover { border-color: var(--primary); background: #2a332a; }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }
      th, td {
        border: 1px solid var(--border);
        padding: 8px;
        text-align: left;
      }
      input, select {
        width: 100%;
        box-sizing: border-box;
        background: #333;
        color: white;
        border: 1px solid var(--border);
        padding: 6px;
      }
      button {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
      }
      button:hover { background: #45a049; }
      #status { margin-top: 10px; font-weight: bold; text-align: center; }
      #warning { color: #f44336; font-size: 14px; margin-bottom: 10px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ONNX to GGUF Converter</h1>
      <div id="warning"></div>
      <div class="dropzone" id="dropzone">
        Drag & Drop model.onnx and tokenizer.json here
        <br/><small>(or click to select)</small>
      </div>
      <input type="file" id="fileInput" multiple style="display:none" />
      
      <div>
        <label>Quantization Target:</label>
        <select id="quantTarget">
          <option value="f32">F32</option>
          <option value="f16">F16</option>
          <option value="q8_0">Q8_0</option>
          <option value="q4_0">Q4_0</option>
        </select>
      </div>
      
      <h3 style="margin-top: 20px;">Metadata</h3>
      <table>
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody id="metaTableBody"></tbody>
      </table>

      <button id="convertBtn">Convert to GGUF</button>
      <div id="status"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
