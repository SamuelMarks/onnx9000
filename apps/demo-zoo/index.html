<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ONNX9000 Model Zoo & Safetensors Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 20px;
      }
      .panel {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        white-space: pre-wrap;
        font-family: monospace;
        min-height: 100px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 15px;
        cursor: pointer;
        background: #20344b;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 10px;
      }
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .progress {
        width: 100%;
        background-color: #ddd;
        border-radius: 4px;
        margin: 10px 0;
        overflow: hidden;
      }
      .progress-bar {
        height: 20px;
        background-color: #4caf50;
        width: 0%;
        transition: width 0.2s;
      }
    </style>
  </head>
  <body>
    <h1>ONNX9000: Model Zoo & Safetensors Demo</h1>
    <p>
      This demo tests fetching safetensors metadata and chunked progressive loading of weights
      natively in the browser without PyTorch.
    </p>

    <button id="fetch-btn" class="btn">Fetch Safetensors Metadata</button>
    <button id="stream-btn" class="btn" disabled>Stream Weights</button>

    <div class="progress">
      <div id="progress-bar" class="progress-bar"></div>
    </div>

    <h3>Output Logs:</h3>
    <div id="zoo-output" class="panel">Waiting...</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
