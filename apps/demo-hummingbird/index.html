<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ONNX9000 Hummingbird Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 20px;
      }
      .panel {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        white-space: pre-wrap;
        font-family: monospace;
        min-height: 100px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 15px;
        cursor: pointer;
        background: #20344b;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 10px;
      }
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>ONNX9000: Hummingbird Web Transpiler</h1>
    <p>
      This demo transpiles traditional ML models (TreeEnsemble) into ONNX Tensor operations directly
      in the browser.
    </p>

    <button id="transpile-btn" class="btn">Transpile to Tensors</button>

    <h3>Transpiler Output:</h3>
    <div id="transpiler-output" class="panel">Waiting...</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
