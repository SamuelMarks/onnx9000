<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ONNX9000 TVM Exporter Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 20px;
      }
      .panel {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        white-space: pre-wrap;
        font-family: monospace;
        min-height: 200px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 15px;
        cursor: pointer;
        background: #20344b;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 10px;
      }
      textarea {
        width: 100%;
        height: 100px;
        margin-bottom: 10px;
        font-family: monospace;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <h1>ONNX9000: TVM Exporter</h1>
    <p>This demo transpiles an ONNX Graph AST into Apache TVM Relay IR.</p>
    <button id="convert-btn" class="btn">Convert to TVM</button>
    <h3>Generated TVM Script:</h3>
    <div id="output" class="panel">Waiting to convert...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
