<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONNX JSON Extractor Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <h1>ONNX to JSON Extractor</h1>
      <div id="drop-zone" class="drop-zone">
        <p>Drag & drop an .onnx file here</p>
        <p>or</p>
        <button id="browse-btn" class="btn">Browse Files</button>
        <input type="file" id="file-input" accept=".onnx" class="hidden" />
      </div>

      <div id="status-panel" class="status-panel hidden">
        <h3 id="status-text">Processing...</h3>
        <div class="progress-bar-bg">
          <div id="progress-bar" class="progress-bar-fg"></div>
        </div>
      </div>

      <div id="error-box" class="error-box hidden"></div>

      <div id="result-panel" class="result-panel hidden">
        <h2>Extraction Complete</h2>
        <p id="stats-text"></p>
        <div class="actions">
          <button id="download-btn" class="btn primary-btn">Download JSON</button>
        </div>
      </div>
    </div>
    <script type="module" src="/app.ts"></script>
  </body>
</html>
