<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ONNX9000 Serverless Edge Serving Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 20px;
      }
      .panel {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        white-space: pre-wrap;
        font-family: monospace;
        min-height: 100px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 15px;
        cursor: pointer;
        background: #20344b;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 10px;
      }
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>ONNX9000: Edge Serving Demo</h1>
    <p>
      This demo tests the KServe / OpenAI-compatible Edge Router running directly within the browser
      context.
    </p>

    <button id="start-btn" class="btn">Start Local Edge Server</button>
    <button id="req-btn" class="btn" disabled>Send Inference Request</button>

    <h3>Server Logs:</h3>
    <div id="server-output" class="panel">Waiting...</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
