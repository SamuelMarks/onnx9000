<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progressive Loading Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 800px;
        margin: 0 auto;
        color: #333;
      }
      h1 {
        color: #0056b3;
      }
      .panel {
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 1rem;
        margin-bottom: 1rem;
        background-color: #f9f9f9;
      }
      button {
        background-color: #0056b3;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        cursor: pointer;
        border-radius: 4px;
        font-size: 1rem;
        margin-right: 0.5rem;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      button:hover:not(:disabled) {
        background-color: #004494;
      }
      #output {
        white-space: pre-wrap;
        background-color: #eee;
        padding: 1rem;
        border-radius: 4px;
        font-family: monospace;
        min-height: 50px;
      }
      input[type="text"] {
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 1rem;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>Progressive Model Loading Demo</h1>
    <p>This demo shows how to use <code>loadProgressive</code> to initialize a session and stream weights on-demand during inference.</p>
    
    <div class="panel">
      <h3>Model URL</h3>
      <input type="text" id="modelUrl" value="https://models.onnx9000.ai/llama3-8b.onnx" />
      <button id="loadBtn">Initialize Session</button>
      <button id="runBtn" disabled>Run Inference (Triggers Download)</button>
    </div>

    <div class="panel">
      <h3>Status & Output</h3>
      <div id="output">Waiting...</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
